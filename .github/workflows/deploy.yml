name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Git pull
        run: |
          cd ${{ secrets.PROD_DEPLOY_PATH }}
          git pull origin main

      - name: Docker rebuild
        run: |
          cd ${{ secrets.PROD_DEPLOY_PATH }}
          docker compose up --build -d

      - name: Verificar containers
        run: |
          cd ${{ secrets.PROD_DEPLOY_PATH }}
          echo "=== Containers em execução ==="
          docker compose ps
          echo "=== Últimas 30 linhas de log ==="
          docker compose logs --tail=30

      - name: Capturar logs em caso de falha
        if: failure()
        run: |
          cd ${{ secrets.PROD_DEPLOY_PATH }}
          echo "=== FALHA NO DEPLOY ==="
          docker compose ps
          docker compose logs --tail=50
